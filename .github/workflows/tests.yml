name: Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-build:
    strategy:
      fail-fast: false
      matrix:
        compiler:
          [
            { c: "clang-cl", cxx: "clang-cl" },
            # { c: "cl", cxx: "cl" },
          ]
    name: Windows - ${{ matrix.compiler.cxx }}
    runs-on: windows-latest

    env:
      triplet: x64-windows

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Configure VS Toolchain
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: vcpkg install yyjson fmt gtest boost-pfr --triplet ${{ env.triplet }}

      - name: Build and test
        run: |
          rm -rf "${{ github.workspace }}\build"
          cmake -B "${{ github.workspace }}\build" -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT\\scripts\\buildsystems\\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=${{ env.triplet }} -DCMAKE_C_COMPILER=${{ matrix.compiler.c }} -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} -G "Ninja Multi-Config"
          # cmake --build "${{ github.workspace }}\build" --config Debug --clean-first
          # ctest --test-dir "${{ github.workspace }}\build" -C Debug
          cmake --build "${{ github.workspace }}\build" --config Release --clean-first
          ctest --test-dir "${{ github.workspace }}\build" -C Release
        shell: bash

  ubuntu-build:
    strategy:
      fail-fast: false
      matrix:
        compiler:
          [
            { c: "gcc-12", cxx: "g++-12", std_format: "OFF" },
            { c: "gcc-13", cxx: "g++-13", std_format: "ON" },
            { c: "gcc-14", cxx: "g++-14", std_format: "ON" },
            { c: "gcc-15", cxx: "g++-15", std_format: "ON" },
            {
              c: "clang-16",
              cxx: "clang++-16",
              std_format: "OFF",
            },
            {
              c: "clang-17",
              cxx: "clang++-17",
              std_format: "OFF",
            },
            {
              c: "clang-18",
              cxx: "clang++-18",
              std_format: "ON",
            },
          ]
    name: Ubuntu - ${{ matrix.compiler.cxx }}
    runs-on: ubuntu-24.04

    env:
      triplet: x64-linux

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install compilers
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install ninja
          if [[ "${{ matrix.compiler.cxx }}" == "g++-15" ]]; then
            sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
            sudo apt-get update
            sudo apt-get install -y gcc-15 g++-15
          fi

      - name: Install dependencies
        run: |
          PKGS="yyjson gtest boost-pfr"
          if [[ "${{ matrix.compiler.std_format }}" == "OFF" ]]; then
            PKGS="$PKGS fmt"
          fi
          CC=${{ matrix.compiler.c }} CXX=${{ matrix.compiler.cxx }} vcpkg install $PKGS --triplet ${{ env.triplet }}

      - name: Build and test
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          rm -rf ${{ github.workspace }}/build
          cmake -B ${{ github.workspace }}/build -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=${{ env.triplet }} -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} -DCPPYYJSON_USE_STD_FORMAT=${{ matrix.compiler.std_format }} -G "Ninja Multi-Config"
          cmake --build ${{ github.workspace }}/build --config Debug --clean-first
          ctest --test-dir ${{ github.workspace }}/build -C Debug
          cmake --build ${{ github.workspace }}/build --config Release --clean-first
          ctest --test-dir ${{ github.workspace }}/build -C Release

  macos-build:
    strategy:
      fail-fast: false
      matrix:
        compiler:
          [
            { c: "gcc-13", cxx: "g++-13", brewpkg: "", std_format: "ON" },
            { c: "gcc-14", cxx: "g++-14", brewpkg: "", std_format: "ON" },
            {
              c: "$(brew --prefix llvm@16)/bin/clang",
              cxx: "$(brew --prefix llvm@16)/bin/clang++",
              brewpkg: "llvm@16",
              std_format: "OFF",
            },
            {
              c: "$(brew --prefix llvm@17)/bin/clang",
              cxx: "$(brew --prefix llvm@17)/bin/clang++",
              brewpkg: "llvm@17",
              std_format: "OFF",
            },
            {
              c: "$(brew --prefix llvm@18)/bin/clang",
              cxx: "$(brew --prefix llvm@18)/bin/clang++",
              brewpkg: "llvm@18",
              std_format: "OFF",
            },
          ]
    name: MacOS - ${{ matrix.compiler.cxx }}
    runs-on: macos-latest

    env:
      triplet: arm64-osx

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install compilers
        run: brew install ninja ${{ matrix.compiler.brewpkg }}

      - name: Install dependencies
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git external/vcpkg
          ./external/vcpkg/bootstrap-vcpkg.sh
          CC=${{ matrix.compiler.c }} CXX=${{ matrix.compiler.cxx }} ./external/vcpkg/vcpkg install yyjson fmt gtest boost-pfr --triplet ${{ env.triplet }}

      - name: Build and test
        run: |
          rm -rf ${{ github.workspace }}/build
          cmake -B ${{ github.workspace }}/build -DCMAKE_TOOLCHAIN_FILE=./external/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=${{ env.triplet }} -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} -DCPPYYJSON_USE_STD_FORMAT=${{ matrix.compiler.std_format }} -G "Ninja Multi-Config"
          cmake --build ${{ github.workspace }}/build --config Debug --clean-first
          ctest --test-dir ${{ github.workspace }}/build -C Debug
          cmake --build ${{ github.workspace }}/build --config Release --clean-first
          ctest --test-dir ${{ github.workspace }}/build -C Release
